<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CivicSewa - Broadcast Channel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background-color: #8ea9bb;
}

/* SIDEBAR */
#sidebar {
    width: 260px;
    background-color: #2A4B79;
    color: white;
    position: fixed; 
    height: 100vh; 
    overflow-y: auto;
}

#sidebar .nav-link {
    color: #dce6f3;
    border-radius: 10px;
    margin-bottom: 6px;
    padding: 10px 15px;
}

#sidebar .nav-link:hover,
#sidebar .nav-link.active {
    background-color: #1d3557;
    color: white;
}

/* CARD FIX: Changed from fixed height to min-height to prevent text overflow */
.broadcast-card {
    background: white;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    position: relative;
    transition: 0.3s ease;
    min-height: 160px; 
    height: 100%;
}

.broadcast-card:hover {
    transform: translateY(-5px);
}

.broadcast-card.emergency {
    border-left: 6px solid #e0333d !important;
}

.delete-btn {
    position: absolute;
    top: 12px;
    right: 12px;
}
</style>
</head>

<body>

<div class="d-flex" style="height: 100vh; width: 3000px;">

    <div id="sidebar" class="d-flex flex-column p-3">
        <h3 class="p-3 fw-bold">CivicSewa</h3>
        <hr>
        <ul class="nav nav-pills flex-column flex-grow-1" style="color:#2A4B79">
            <li><a href="ward-dashboard.html" class="nav-link"><i class="bi bi-grid-1x2 me-2"></i> Dashboard</a></li>
            <li><a href="ward-complaints.html" class="nav-link"><i class="bi bi-chat-dots me-2"></i> Ward Complaints</a></li>
            <li><a href="ward-broadcast.html" class="nav-link active"><i class="bi bi-broadcast me-2"></i> Broadcast Channel</a></li>
            <li><a href="ward-settings.html" class="nav-link"><i class="bi bi-gear me-2"></i> Settings</a></li>
        </ul>
        <hr>
        <button id="logoutBtn" class="btn btn-outline-light w-100">Sign Out</button>
    </div>

    <div class="flex-grow-1" style="margin-left:260px; min-height:100vh;">

        <nav class="navbar shadow-sm p-3" style="background:#2A4B79;color:white;">
            <div class="container-fluid">
                <span class="fw-bold">Ward Broadcast Channel</span>
                
                <div class="ms-auto d-flex align-items-center">
                    <span id="uWard" class="me-3 badge bg-primary"></span>
                    <span id="uNameTop" class="me-3 fw-bold small"></span>

                    <select id="languageSelect" class="form-select form-select-sm w-auto me-3"> 
                        <option value="en"> English </option>
                        <option value="np"> नेपाली </option>
                    </select>

                    <button class="btn btn-light" data-bs-toggle="modal" data-bs-target="#createModal">
                        + Create Broadcast
                    </button>
                </div>
            </div>
        </nav>

        <div class="container-fluid p-4 h-100">
            <div class="row g-4" id="broadcastContainer"></div>
        </div>

    </div>
</div>

<div class="modal fade" id="createModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Create Broadcast</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <input id="title" class="form-control mb-3" placeholder="Title">
                <textarea id="content" class="form-control mb-3" placeholder="Content" rows="4"></textarea>

                <div class="mb-3">
                  <label class="form-label">Issue Category</label>
                  <select id="category" class="form-select">
                    <option value="General">Select Category (Defaults to General)</option>
                    <option value="Water">Water</option>
                    <option value="Electricity">Electricity</option>
                    <option value="Road">Road</option>
                    <option value="Waste">Waste</option>
                  </select>
                </div>

                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="emergency">
                    <label class="form-check-label">Mark as Emergency</label>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" id="postBtn">Post</button>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script type="module" src="ward-broadcast.js"></script>

</body>
</html>
