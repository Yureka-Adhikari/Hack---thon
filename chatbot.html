<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicSewa | Guidance Chatbot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="chatbot.css">
</head>
<body>

<div class="layout-wrapper">
    <div id="sidebar" class="sidebar">
        <h3 class="fw-bold">CivicSewa</h3>
        <hr>
        <ul class="nav nav-pills flex-column flex-grow-1">
            <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="bi bi-grid-1x2 me-2"></i> Dashboard</a></li>
            <li><a href="my-complaints.html" class="nav-link"><i class="bi bi-chat-dots me-2"></i> My Complaints</a></li>
            <li><a href="documents.html" class="nav-link"><i class="bi bi-file-earmark-pdf me-2"></i> Documents</a></li>
            <li><a href="broadcast.html" class="nav-link"><i class="bi bi-broadcast me-2"></i> Broadcast Channel</a></li>
            <li><a href="road.html" class="nav-link"><i class="bi bi-signpost-2 me-2"></i> Road </a></li>
            <li><a href="chatbot.html" class="nav-link active"><i class="bi bi-robot me-2"></i> Guidance Chatbot </a></li>
            <li><a href="settings.html" class="nav-link"><i class="bi bi-gear me-2"></i> Settings</a></li>
        </ul>
        <hr>
        <button id="logoutBtn" class="btn btn-outline-light w-100">Sign Out</button>
    </div>

    <div class="main-content">
        <nav class="navbar navbar-expand shadow-sm top-navbar">
            <div class="container-fluid">
                <input type="text" class="form-control" placeholder="Search...">
                <div class="ms-auto d-flex align-items-center">
                    <span class="badge badge-ward me-3" id="uWard">Ward --</span>
                    <strong id="uNameTop">User Name</strong>
                </div>
            </div>
        </nav>

        <div class="chat-container-padding">
            <div class="chat-wrapper">
                <div class="chat-header">
                    <span>Guidance Chatbot</span>
                    <button id="exportChat" class="btn btn-outline-primary btn-sm">
                        <i class="bi bi-download me-1"></i> Export
                    </button>
                </div>

                <div class="chat-body" id="chatBody">
                    <div class="message ai">
                        <div>Hello! I'm your CivicSewa assistant. How can I help you with your local issues today?</div>
                        <div class="timestamp">Just now</div>
                    </div>
                </div>

                <div class="typing-indicator hidden" id="typingIndicator">
                    <small>AI is thinking...</small>
                </div>

                <div class="chat-input-area">
                    <input type="file" id="fileInput" hidden />
                    <button id="attachBtn" class="icon-btn" title="Attach Document">
                        <i class="bi bi-paperclip"></i>
                    </button>
                    <textarea id="chatInput" rows="1" placeholder="Describe your issue..."></textarea>
                    <button id="sendBtn" class="btn btn-primary btn-send">
                        <i class="bi bi-send-fill text-white"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module" src="chatbot.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</body>
</html>
