<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CivicSewa | Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root{
    --primary:#7c3aed;
    --panel:rgba(255,255,255,.07);
    --soft:rgba(255,255,255,.05);
    --border:rgba(255,255,255,.1);
    --muted:rgba(255,255,255,.5);
    --gold:#FFD700;
}

body{
    background:radial-gradient(circle at top,#1e1b4b,#020617);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    font-family:"Segoe UI",sans-serif;
    perspective:1200px;
    transition:.6s;
}

/* flip overlay */
#themeFlip{
    position:fixed;
    inset:0;
    background:linear-gradient(135deg,#eaf3ff,#dcecf1);
    z-index:9998;
    transform:rotateY(90deg);
    transform-origin:center;
    transition:.6s cubic-bezier(.77,0,.175,1);
    backface-visibility:hidden;
}
#themeFlip.active{ transform:rotateY(0deg); }

/* bg grid */
.bg-lines{
    position:absolute;
    inset:0;
    background:
        repeating-linear-gradient(135deg,
            rgba(124,58,237,.07) 0px,
            rgba(124,58,237,.07) 1px,
            transparent 1px,
            transparent 18px);
    animation:drift 40s linear infinite;
}
@keyframes drift{
    from{background-position:0 0;}
    to{background-position:1000px 1000px;}
}

/* ambient glows */
.glow{
    position:absolute;
    border-radius:50%;
    filter:blur(120px);
    z-index:0;
    pointer-events:none;
    animation:pulse 8s ease-in-out infinite alternate;
}
.glow-1{ width:50vw; height:50vw; top:-10%; right:5%;  background:#5c3b99; opacity:.5; }
.glow-2{ width:40vw; height:40vw; bottom:5%; left:-10%; background:#1a3a7c; opacity:.4; animation-delay:-3s; }
@keyframes pulse{ 0%{transform:scale(1);opacity:.4} 100%{transform:scale(1.1);opacity:.7} }

/* floating widgets */
.widget{
    position:absolute;
    background:rgba(255,255,255,.04);
    backdrop-filter:blur(20px);
    border-radius:16px;
    box-shadow:0 20px 50px rgba(124,58,237,.15);
    border:1px solid var(--border);
    animation:float 8s ease-in-out infinite;
}
.w1{width:220px;height:140px;left:6%;top:20%;}
.w2{width:180px;height:110px;right:8%;top:30%;animation-delay:1s;}
.w3{width:260px;height:150px;right:12%;bottom:18%;animation-delay:2s;}
@keyframes float{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-20px);} }

/* dino */
.dino{
    position:absolute;
    right:40px;
    bottom:40px;
    font-size:90px;
    animation:float 6s ease-in-out infinite;
    filter:drop-shadow(0 0 30px rgba(124,58,237,.6));
}
.dino span{
    position:absolute;
    top:-20px;
    right:-20px;
    background:var(--primary);
    color:white;
    font-weight:800;
    padding:6px 14px;
    border-radius:14px;
    font-size:14px;
}

/* login card */
.login-card{
    position:relative;
    background:var(--panel);
    backdrop-filter:blur(30px);
    border-radius:24px;
    padding:50px;
    width:100%;
    max-width:420px;
    box-shadow:0 30px 80px rgba(0,0,0,.5);
    border:1px solid var(--border);
    z-index:10;
    animation:fadeIn 1s ease;
}
@keyframes fadeIn{ from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }

h2{
    font-weight:900;
    color:#fff;
    text-align:center;
    margin-bottom:30px;
    cursor:pointer;
}
h2 span{ color:var(--gold); }

/* role box */
.role-box{
    background:var(--soft);
    border-radius:12px;
    padding:10px 14px;
    margin-bottom:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:var(--muted);
    border:1px solid var(--border);
}
.role-box select{
    background:transparent;
    border:none;
    color:#a78bfa;
    font-weight:700;
    outline:none;
}

/* inputs */
.form-control{
    background:var(--soft);
    border:1px solid var(--border);
    color:white;
    border-radius:12px;
    padding:14px;
}
.form-control::placeholder{ color:rgba(255,255,255,.3); }
.form-control:focus{
    background:rgba(124,58,237,.15);
    box-shadow:0 0 0 2px rgba(124,58,237,.4);
    border-color:var(--primary);
    color:white;
}

/* button */
.btn-primary{
    background:linear-gradient(135deg,#7c3aed,#4f46e5);
    border:none;
    font-weight:700;
    border-radius:12px;
    padding:12px;
    box-shadow:0 4px 20px rgba(124,58,237,.4);
    transition:.3s;
}
.btn-primary:hover{ transform:translateY(-2px); box-shadow:0 8px 28px rgba(124,58,237,.6); background:linear-gradient(135deg,#6d28d9,#4338ca); }

a{ color:#a78bfa; text-decoration:none; }
a:hover{ text-decoration:underline; }

/* theme toggle */
#themeToggle{
    position:fixed;
    top:20px;
    left:20px;
    z-index:9999;
    background:var(--primary);
    color:white;
    border:none;
    width:44px;
    height:44px;
    border-radius:50%;
    font-size:18px;
    cursor:pointer;
    box-shadow:0 0 20px rgba(124,58,237,.5);
}

/* modal */
.modal-content{
    background:rgba(20,14,40,.97);
    backdrop-filter:blur(30px);
    border:1px solid var(--border);
    border-radius:20px;
    color:white;
}
.modal-content h5{ color:white; }
.modal-content p{ color:var(--muted); }
</style>
</head>

<body>

<div id="themeFlip"></div>
<button id="themeToggle">☀️</button>

<div class="bg-lines"></div>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<div class="widget w1"></div>
<div class="widget w2"></div>
<div class="widget w3"></div>

<div class="dino">🦖<span>CivicSewa</span></div>

<div class="login-card">
<h2 onclick="location.href='index.html'">Civic<span>Sewa</span></h2>

<div class="role-box">
    <span>Sign in as</span>
    <select id="role">
        <option value="citizen">Citizen</option>
        <option value="admin">Ward Admin</option>
    </select>
</div>

<form>
    <input type="email" id="loginEmail" class="form-control mb-3" placeholder="Email" required>
    <input type="password" id="loginPassword" class="form-control mb-3" placeholder="Password" required>

    <div class="d-flex justify-content-between mb-3">
        <a href="forgot.html">Forgot password?</a>
        <a href="signup.html">Create account</a>
    </div>

    <button type="button" id="loginBtn" class="btn btn-primary w-100">Login</button>
</form>
</div>

<div class="modal fade" id="verificationModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content p-4 text-center">
            <div style="font-size:2.5rem; margin-bottom:12px;">📬</div>
            <h5>Email Verification Required</h5>
            <p class="small mt-2">
                A verification email has been sent to:<br>
                <strong id="verifyEmail" style="color:var(--gold);"></strong>
            </p>
            <button id="resendBtn" class="btn btn-primary mt-2 w-100">Resend Email</button>
        </div>
    </div>
</div>

<script>
const toggle = document.getElementById("themeToggle");
const flip = document.getElementById("themeFlip");

toggle.onclick = () => {
    flip.classList.add("active");
    setTimeout(() => { flip.classList.remove("active"); }, 600);
};
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="js/core/auth-check.js"></script>

</body>
</html>
